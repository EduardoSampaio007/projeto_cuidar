<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuidar de quem cuida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos/chatStyle.css">
</head>
<body>
    <main class="mainContainer">
        <div class="chatHeader">
            <h1>Chat</h1>
            <div class="chat-tabs">
                <button class="chat-btn active">
                    <i class="fa-solid fa-robot"></i>
                    <span>Assistente virtual</span>
                </button>
                <button class="chat-btn">
                    <i class="fa-solid fa-user-doctor"></i>
                    <span>Colega</span>
                </button>
            </div>
        </div>

        <div class="chat-container">
            <div class="message-row">
                <div class="chat-avatar">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="message-bubble">
                    Como está se sentindo?
                </div>
            </div>
        </div>

        <div class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" placeholder="Digite aqui..." disabled>
            <button class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
    </main>

    <footer>
        <nav>
            <a href="index.html" class="nav-link">
                <i class="fa-solid fa-house"></i>
            </a>

            <a href="chat.html" class="nav-link active">
                <i class="fa-solid fa-message"></i>
            </a>

            <a href="rewards.html" class="nav-link">
                <i class="fa-solid fa-award"></i>
            </a>

            <a href="#" class="nav-link">
                <i class="fa-solid fa-clipboard-list"></i>
            </a>
        </nav>
    </footer>

    <script>
        const abas = document.querySelectorAll('.chat-btn');
        const containerMensagens = document.querySelector('.chat-container');

        abas.forEach((aba, indice) => {
            aba.addEventListener('click', () => {
                document.querySelector('.chat-btn.active').classList.remove('active');
                aba.classList.add('active');
                if (indice === 0) {
                    containerMensagens.style.display = 'block'; 
                } else {
                    containerMensagens.style.display = 'none'; 
                }
            });
        });
    </script>
</body>
</html>

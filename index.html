<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuidar de quem cuida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <header>
        <img src="imagens/logoSite (1).png" alt="logoSite">

        <h2>Olá, Eduardo!</h2>
    </header>

    <main>
        <h2>Monitoramento</h2>

        <div class="monitoring">
            <div class="monitoringContent">
                <img src="imagens/logoBpm.png" alt="logoBpm">
                <p>67 BPM</p>
            </div>

            <div class="monitoringContent">
                <img src="imagens/logoSono.png" alt="logoSono">
                <p>7 HORAS</p>
            </div>
        </div>

        <div class="chatIA">
            <img src="imagens/logoChatIA.png" alt="logoChatIA">
            <p>Como está se sentindo?</p>

            <div class="buttons">
                <button><i class="fa-solid fa-face-grin-beam"></i> <p>Bem</p></button>
                <button><i class="fa-solid fa-face-meh"></i> <p>Ok</p></button>
                <button><i class="fa-solid fa-face-frown"></i> <p>Mal</p></button>
            </div>
        </div>

        <div class="rewards">
            <p>Faltam 50 pontos para sua próxima folga</p>

            <div class="progress">
                <div class="progressBar"></div>
                <p class="currentPoints">100pts</p>
            </div>

            

            <button disabled>Resgatar</button>
        </div>
    </main>

    <footer>
        <nav>
            <a href="index.html" class="nav-link">
                <i class="fa-solid fa-house"></i>
            </a>

            <a href="chat.html" class="nav-link">
                <i class="fa-solid fa-message"></i>
            </a>

            <a href="#" class="nav-link">
                <i class="fa-solid fa-award"></i>
            </a>

            <a href="#" class="nav-link">
                <i class="fa-solid fa-clipboard-list"></i>
            </a>
        </nav>
    </footer>
</body>
</html>
